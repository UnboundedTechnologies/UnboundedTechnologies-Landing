# Dependabot configuration. https://docs.github.com/en/code-security/dependabot
#
# Strategy: keep npm + GitHub Actions deps current with grouped weekly PRs.
# Production dependencies get individual PRs (so risky changes are easy to
# revert); dev dependencies are grouped by ecosystem (less noise, lower risk).
#
# Major bumps require manual review; we set `versioning-strategy: increase`
# so bumps stay within the existing range when possible.

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Toronto
    open-pull-requests-limit: 5
    versioning-strategy: increase
    commit-message:
      prefix: deps
      prefix-development: deps(dev)
      include: scope
    labels:
      - dependencies
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
    ignore:
      # Three.js / R3F / drei coordinate together; pin them by hand to avoid
      # accidental peer-dep mismatches on minor bumps.
      - dependency-name: three
      - dependency-name: "@react-three/*"
      - dependency-name: "@types/three"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Toronto
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions
