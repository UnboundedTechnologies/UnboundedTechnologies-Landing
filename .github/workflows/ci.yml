name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm type-check

      # Use pnpm exec (not dlx) so the locally pinned @playwright/test version
      # installs its matching browser revision. `pnpm dlx playwright install`
      # would fetch `playwright@latest` from npm and install a newer browser
      # build that the pinned test runner cannot find at run time.
      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm build

      - run: pnpm test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
